const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render(lang){
  const c = DATA[lang];
  document.documentElement.lang = lang;
  // simple text bindings
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = c[el.dataset.t]; });

  // marquee
  document.getElementById('focus').innerHTML = c.focus.map(f =>
    `<span>${esc(f)}<span class="star">✦</span></span>`).join('');

  // facts
  document.getElementById('facts').innerHTML = c.facts.map(ft =>
    `<div class="fact"><div class="fact-val">${esc(ft.value)}</div><div class="fact-lbl">${esc(ft.label)}</div></div>`).join('');

  // skills
  document.getElementById('skill-grid').innerHTML = c.skillGroups.map(g =>
    `<div data-reveal class="skill-card">
      <div class="top"><span class="num">${esc(g.num)}</span><h3>${esc(g.title)}</h3></div>
      <div class="chips">${g.items.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div>
    </div>`).join('');

  // experiences
  document.getElementById('exp-list').innerHTML = c.experiences.map(e =>
    `<div data-reveal class="exp">
      <div>
        <div class="period">${esc(e.period)}</div>
        <div class="place">${esc(e.place)}</div>
        <div class="kind">${esc(e.kind)}</div>
      </div>
      <div>
        <h3>${esc(e.org)}</h3>
        <p class="desc">${esc(e.desc)}</p>
      </div>
    </div>`).join('');

  // projects
  document.getElementById('proj-grid').innerHTML = c.projects.map(p =>
    `<div data-reveal class="proj">
      <div class="top"><span class="num">${esc(p.num)}</span><span class="year">${esc(p.year)}</span></div>
      <h3>${esc(p.title)}</h3>
      <p class="desc">${esc(p.desc)}</p>
      <div class="impact-box">
        <div class="impact-lbl">${esc(c.impactLabel)}</div>
        <div class="impact-val">${esc(p.impact)}</div>
      </div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>`).join('');

  // contact items
  document.getElementById('contact-grid').innerHTML = c.contactItems.map(ci =>
    `<div><div class="ci-lbl">${esc(ci.label)}</div><a class="ci-val" href="${esc(ci.href)}">${esc(ci.value)}</a></div>`).join('');

  // toggle active state
  document.getElementById('btn-fr').classList.toggle('active', lang==='fr');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');

  initReveal();
}

let io;
function initReveal(){
  const els = Array.from(document.querySelectorAll('[data-reveal]'));
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const el = entry.target;
        const sibs = Array.from(el.parentElement ? el.parentElement.querySelectorAll(':scope > [data-reveal]') : [el]);
        const idx = Math.max(0, sibs.indexOf(el));
        el.style.transitionDelay = (idx*70)+'ms';
        el.classList.add('in');
        io.unobserve(el);
      }
    });
  }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });
  els.forEach(el=>io.observe(el));
}

function setLang(lang){
  try{ localStorage.setItem('lang', lang); }catch(e){}
  render(lang);
}

document.getElementById('btn-fr').addEventListener('click', ()=>setLang('fr'));
document.getElementById('btn-en').addEventListener('click', ()=>setLang('en'));

let initial = 'fr';
try{ const s = localStorage.getItem('lang'); if(s) initial = s; }catch(e){}
if(initial==='fr' && (navigator.language||'').slice(0,2)!=='fr'){ /* keep fr default */ }
render(initial);
</script>
